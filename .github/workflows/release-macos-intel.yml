name: Release macOS Intel

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag de release a completar (ej: v0.0.2)'
        required: true
        default: 'v0.0.2'

env:
  PNPM_VERSION: 9.15.4

jobs:
  build-macos-intel:
    name: Build macOS Intel (x64)
    runs-on: macos-13
    permissions:
      contents: write
    concurrency:
      group: release-macos-intel-${{ github.event.inputs.tag }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository at selected tag
        uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ github.event.inputs.tag }}

      - name: Install macOS OCR dependencies
        run: |
          brew update
          brew install leptonica tesseract pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix leptonica)/lib/pkgconfig:$(brew --prefix tesseract)/lib/pkgconfig:${PKG_CONFIG_PATH}" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Restore canonical lockfile
        run: git checkout -- pnpm-lock.yaml

      - name: Install frontend dependencies
        shell: pwsh
        run: npm exec --package=pnpm@${{ env.PNPM_VERSION }} -- pnpm install --frozen-lockfile

      - name: Build and upload macOS Intel assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag }}
          releaseName: 'EntropIA ${{ github.event.inputs.tag }}'
          releaseBody: 'macOS Intel artifacts uploaded via manual workflow.'
          releaseDraft: false
          prerelease: false
          args: '-- --no-default-features'
