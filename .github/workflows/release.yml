name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  PNPM_VERSION: 9.15.4

jobs:
  build:
    name: Build ${{ matrix.name }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-latest
            platform: windows-latest
            build_args: ''
            rust_target: ''
          - name: macos-14 (arm64)
            platform: macos-14
            build_args: '--target aarch64-apple-darwin'
            rust_target: 'aarch64-apple-darwin'
          - name: ubuntu-22.04
            platform: ubuntu-22.04
            build_args: '-- --no-default-features'
            rust_target: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libleptonica-dev \
            libtesseract-dev \
            pkg-config \
            patchelf

      - name: Install macOS OCR dependencies
        if: startsWith(matrix.platform, 'macos-')
        run: |
          brew update
          brew install leptonica tesseract pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix leptonica)/lib/pkgconfig:$(brew --prefix tesseract)/lib/pkgconfig:${PKG_CONFIG_PATH}" >> "$GITHUB_ENV"

      - name: Install Windows OCR dependencies (vcpkg)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:USERPROFILE\vcpkg"
          & "$env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          & "$env:USERPROFILE\vcpkg\vcpkg.exe" install tesseract:x64-windows-static-md
          "VCPKG_ROOT=$env:USERPROFILE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Install Rust target (macOS cross-compilation)
        if: matrix.rust_target != ''
        run: |
          rustup target add ${{ matrix.rust_target }}

      - name: Restore canonical lockfile
        run: git checkout -- pnpm-lock.yaml

      - name: Install frontend dependencies
        shell: pwsh
        run: npm exec --package=pnpm@${{ env.PNPM_VERSION }} -- pnpm install --frozen-lockfile

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'EntropIA ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download the installer for your platform.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.build_args }}
