[package]
name = "entropia-desktop"
version = "0.0.1"
edition = "2021"

[lib]
name = "entropia_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[features]
default = ["embeddings"]
embeddings = ["dep:fastembed", "dep:sqlite-vec"]

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rusqlite = { version = "0.31", features = ["bundled"] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
thiserror = "1"
ocrs = "0.8"
rten = "0.13"
pdf-extract = "0.7"
image = "0.25"
imageproc = "0.25"
tokio = { version = "1", features = ["full"] }
fastembed = { version = "5", optional = true }
sqlite-vec = { version = "0.1.10-alpha.3", optional = true }
regex = "1"
once_cell = "1"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
